<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/auth.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <title>Life state | login</title>
  </head>
  <body>
    <div class="container" id="container">
      <div class="form-container sign-up">
        <form>
          <h1>Create Account</h1>
          <div class="social-icons">
            <a href="#" class="icon"><i class="fa-brands fa-google-plus-g"></i></a>
            <a href="#" class="icon"><i class="fa-brands fa-facebook-f"></i></a>
            <a href="#" class="icon"><i class="fa-brands fa-github"></i></a>
            <a href="#" class="icon"><i class="fa-brands fa-linkedin-in"></i></a>
          </div>
          <span>or register with email</span>

          <div class="input-group">
            <input type="text" id="userName" required autocomplete="off" placeholder=" " />
            <label for="userName">Name</label>
          </div>

          <div class="input-group">
            <input type="email" id="email" required autocomplete="off" placeholder=" " />
            <label for="email">Email</label>
          </div>

          <div class="input-group">
            <input type="password" id="password" required autocomplete="off" placeholder=" " />
            <label for="password">Password</label>
          </div>

          <button type="submit">Sign Up</button>
        </form>
      </div>

      <div class="form-container sign-in">
        <form>
          <h1>Sign In</h1>
          <div class="social-icons">
            <a href="#" class="icon"><i class="fa-brands fa-google-plus-g"></i></a>
            <a href="#" class="icon"><i class="fa-brands fa-facebook-f"></i></a>
            <a href="#" class="icon"><i class="fa-brands fa-github"></i></a>
            <a href="#" class="icon"><i class="fa-brands fa-linkedin-in"></i></a>
          </div>
          <span>or use email and Password</span>

          <div class="input-group">
            <input type="email" id="signin-email" required autocomplete="off" placeholder=" " />
            <label for="signin-email">Email</label>
          </div>

          <div class="input-group">
            <input type="password" id="signin-password" required autocomplete="off" placeholder=" " />
            <label for="signin-password">Password</label>
          </div>

          <a href="#" class="forgot-password">Forgot Your Password?</a>
          <button type="submit">Sign In</button>
        </form>
      </div>

      <div class="toggle-container">
        <div class="toggle">
          <div class="toggle-panel toggle-left">
            <h1>Welcome back</h1>
            <p>Enter your personal details to use our services</p>
            <button class="hidden" id="login">Sign In</button>
          </div>
          <div class="toggle-panel toggle-right">
            <h1>Create Account</h1>
            <p>Join us to access our exclusive features</p>
            <button class="hidden" id="register">Sign Up</button>
          </div>
        </div>
      </div>

      <div class="mobile-toggle-buttons">
        <div class="slider-indicator"></div>
        <button type="button" class="mob-btn active-mob" id="mobile-login-btn">
          Sign In
        </button>
        <button type="button" class="mob-btn" id="mobile-register-btn">
          Sign Up
        </button>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/auth.js"></script>
  </body>
</html>
